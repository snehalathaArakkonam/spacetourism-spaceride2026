        <main>
            <h1 class="page-title">🚀 Rocket Launch Simulator</h1>
            <div style="max-width: 700px; margin: 2rem auto; background: rgba(0, 170, 255, 0.08); padding: 2rem; border-radius: 20px; border: 2px solid #00aaff;">
                <h3 style="color: #00ffff; text-align: center; margin-bottom: 1.5rem;">Control Your Rocket! 🎮</h3>
                <div style="display: grid; gap: 1.5rem;">
                    <div>
                        <label for="throttleSlider" style="display: block; color: #00ffff; font-weight: bold; margin-bottom: 0.5rem;">Throttle Power: <span id="throttleValue">50</span>%</label>
                        <input type="range" id="throttleSlider" min="0" max="100" value="50" style="width: 100%; cursor: pointer;">
                    </div>
                    <canvas id="rocketSimCanvas" width="650" height="300" style="background: rgba(0,0,0,0.7); border: 2px solid #00ffff; border-radius: 10px; display: block; margin: 0 auto;"></canvas>
                    <button id="launchBtn" style="padding: 1rem 2rem; background: linear-gradient(45deg, #00aaff, #cc00ff); color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 1.1rem;">LAUNCH ROCKET 🚀</button>

    <script>
        // Update throttle display
        const throttleSlider = document.getElementById('throttleSlider');
        if (throttleSlider) {
            throttleSlider.addEventListener('input', function() {
                document.getElementById('throttleValue').textContent = this.value;
            });
        }
    </script>
